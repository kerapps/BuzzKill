name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version $VERSION from manifest.json"

      - name: Build zip
        run: |
          zip -r buzzkill.zip \
            manifest.json \
            background.js \
            config.js \
            translator.js \
            content.js \
            content.css \
            popup.html \
            popup.js \
            popup.css \
            icons/icon16.png \
            icons/icon48.png \
            icons/icon128.png

      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ steps.version.outputs.tag }}" --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            buzzkill.zip \
            --title "BuzzKill ${{ steps.version.outputs.version }}" \
            --notes "Install: download \`buzzkill.zip\`, unzip it into a folder, then load unpacked in \`chrome://extensions/\` with Developer mode enabled." \
            --latest
